<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Watchlist</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="wrap">

    <div class="header">
      <h1>&#127916; My Watchlist</h1>
      <div class="stats">
        <div class="pill">Total: <span id="st-total">0</span></div>
        <div class="pill">Watched: <span id="st-watched">0</span></div>
        <div class="pill">Remaining: <span id="st-left">0</span></div>
      </div>
    </div>

    <div class="add-card">
      <h2>Add a movie</h2>
      <div class="form-row">
        <input type="text" id="inp-title" placeholder="Movie title" />
        <input type="number" id="inp-year" placeholder="Year e.g. 2023" min="1900" max="2026" />
      </div>
      <div class="form-full">
        <select id="inp-genre">
          <option value="">Genre</option>
          <option>Action</option>
          <option>Comedy</option>
          <option>Drama</option>
          <option>Horror</option>
          <option>Sci-Fi</option>
          <option>Romance</option>
          <option>Thriller</option>
          <option>Animation</option>
          <option>Documentary</option>
        </select>
        <button class="add-btn" id="add-btn">+ Add Movie</button>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="unwatched">To Watch</button>
      <button class="filter-btn" data-filter="watched">Watched</button>
    </div>

    <div class="movie-list" id="movie-list"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
